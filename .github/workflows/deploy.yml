# 改 resume.yaml → push → 網站自動更新
#
# 個資分級:
#   - 網站(本 workflow)不帶 Secret 建置,任何個資都不會上線;
#     部署前用程式檢查電話號碼沒出現在產物裡、也沒有任何 PDF 被夾帶
#   - 含個資的 PDF 已從網站下架(2026-07-04),需要時在本機執行
#     npm run pdf 產出(讀取本機的 resume.private.yaml)
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: 建置公開網站(不帶個資 Secret)
        run: npm run build

      - name: 驗證部署產物不含個資
        env:
          RESUME_PRIVATE_YAML: ${{ secrets.RESUME_PRIVATE_YAML }}
        run: |
          if find out -name '*.pdf' | grep -q .; then
            echo "::error::網站已下架 PDF,部署產物不應包含任何 PDF 檔案"
            exit 1
          fi
          PHONE=$(printf '%s' "$RESUME_PRIVATE_YAML" | grep -oP 'phone:\s*\K[^\s#]+' || true)
          if [ -z "$PHONE" ]; then
            echo "未設定個資 Secret,略過電話檢查"
            exit 0
          fi
          if grep -rF -- "$PHONE" out/; then
            echo "::error::個資洩漏:電話號碼出現在部署產物中"
            exit 1
          fi
          echo "檢查通過:部署產物不含個資"

      - name: 設定 GitHub Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: 上傳 Pages 產物
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

      - name: 部署
        id: deployment
        uses: actions/deploy-pages@v4
